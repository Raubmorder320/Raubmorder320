name: Metrics
on:
  # Обновлять каждый день в полночь
  schedule: [{cron: "0 0 * * *"}]
  # Возможность запустить вручную кнопку
  workflow_dispatch:
  # Запускать при каждом пуше в ветку main/master
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Токен (выдается автоматически, ничего настраивать не надо)
          token: ${{ secrets.GITHUB_TOKEN }}

          # Настройки внешнего вида
          user: Raubmorder320
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Moscow
          
          # Плагин языков (покажет Python, Linux и т.д.)
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: "github"
          plugin_languages_threshold: 0%
